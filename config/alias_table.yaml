# D3 keyword index — alias-table curata: sinonimo/colloquiale -> termini CANONICI.
# Colma il gap di vocabolario utente/documento: a match-time la query viene espansa con
# i termini `expand`, che poi agganciano l'indice (costruito da titoli + summary dei nodi).
# Match deterministico, versionato, modificabile senza toccare codice.
# In Fase 4 l'ontologia auto-popolerà questa tabella. Qui un seme per il quadro pilota RP.
aliases:
  - term: dentista
    expand: [spese sanitarie, spese mediche]
  - term: farmacia
    expand: [spese sanitarie, medicinali]
  - term: ticket
    expand: [spese sanitarie, prestazioni]
  - term: occhiali
    expand: [spese sanitarie, dispositivi medici]
  - term: mutuo
    expand: [interessi mutui ipotecari, abitazione principale]
  - term: affitto
    expand: [canoni locazione, inquilini]
  - term: ristrutturazione
    expand: [recupero patrimonio edilizio, interventi]
  - term: asilo nido
    expand: [rette asili nido]

    difficolta: media
    hops: 1
    answerable: true
    domanda: "Esiste una detrazione per le spese di mantenimento dei cani guida?"
    expected_target: "RP82"
    must_include: []
  - id: rp-007
    categoria: fattuale
    difficolta: facile
    hops: 1
    answerable: true
    domanda: "C'è una detrazione per gli inquilini con contratto di locazione dell'abitazione principale?"
    expected_target: "RP71"
    must_include: []
  - id: rp-008
    categoria: fattuale
    difficolta: difficile
    hops: 1
    answerable: true
    domanda: "Con quale codice si indicano le spese di intermediazione immobiliare?"
    expected_target: "codice 17"
    must_include: ["17"]

  # ---- procedurale (multi-passo) ----
  - id: rp-009

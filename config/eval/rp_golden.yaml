# Golden set di evaluation per la fetta RP (FR-E). Curato a mano, versionato.
# Stratificato per: categoria, difficolta, hops (parti necessarie), answerable, expected_target.
# Scopo: confrontare servi-intero vs navigazione+pin e far emergere i punti deboli.
# NB: bozza v1 generata dall'assistente; l'owner (umano) validera'/aggiungera' domande reali.
#
# categoria:
#   fattuale        - un singolo fatto puntuale (1 voce)
#   procedurale     - "come si fa" multi-passo
#   pin_dependent   - richiede una regola governante ereditata (sezione/quadro), non nel rigo
#   disambiguazione - query lessicalmente ambigua: il fast-path inganna, serve la nav-LLM
#   aggregazione    - richiede piu' voci/codici insieme (multi-hop ampio)
#   fuori_corpus    - risposta NON presente nella fetta RP -> atteso RIFIUTO
# hops: numero approssimato di parti distinte necessarie (0 per i fuori_corpus)

cases:
  # ---- fattuale (1 hop) ----
  - id: rp-001
    categoria: fattuale
    difficolta: facile
    hops: 1
    answerable: true
    domanda: "Qual è la percentuale di detrazione delle spese sanitarie?"
    expected_target: "RP1"
    must_include: ["19"]
  - id: rp-002
    categoria: fattuale
    difficolta: facile
    hops: 1
    answerable: true
    domanda: "A quale rigo vanno indicati gli interessi sul mutuo ipotecario per l'abitazione principale?"
    expected_target: "RP7"
    must_include: ["RP7"]
  - id: rp-003
    categoria: fattuale
    difficolta: facile
    hops: 1
    answerable: true
    domanda: "Le spese veterinarie sono detraibili? Con quale codice?"
    expected_target: "codice 29"
    must_include: ["29"]
  - id: rp-004
    categoria: fattuale
    difficolta: media
    hops: 1
    answerable: true
    domanda: "Con quale codice si indicano le spese per la frequenza di asili nido?"
    expected_target: "codice 33"
    must_include: ["33"]
  - id: rp-005
    categoria: fattuale
    difficolta: media
    hops: 1
    answerable: true
    domanda: "Dove indico i redditi prodotti a Campione d'Italia?"
    expected_target: "RP90"
    must_include: ["Campione"]
  - id: rp-006

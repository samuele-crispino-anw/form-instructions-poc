# Configurazione runtime del PoC. Modificabile senza toccare codice.

[paths]
data_dir = "data"
raw_dir = "data/raw"
pages_dir = "data/pages"
markdown_dir = "data/markdown"
db_path = "data/poc.db"

# Modello Anthropic per scopo (FR-T2 traccia per scopo).
# Opus-class per i compiti one-time costosi; Haiku-class per router/runtime.
[models]
conversion = "claude-opus-4-8"   # FR-B2: trascrizione VLM pagina->markdown
compile    = "claude-opus-4-8"   # FR-D2: estrazione one-time DB ontologico
router     = "claude-haiku-4-5"  # FR-B4: classificazione sezione
answer     = "claude-haiku-4-5"  # FR-B6/FR-D4: generazione risposta runtime
eval       = "claude-haiku-4-5"  # FR-E: LLM-judge

[llm]
max_tokens = 4096

[rendering]
dpi = 175                        # FR-B1: 150-200 DPI

[crosscheck]
overlap_threshold = 0.6          # FR-B2: sotto soglia -> needs_review

# Routing per-pagina: default Rotta A (text-layer); VLM solo dove il text-layer è inutile.
# Lo spike mostra che la Rotta A gestisce anche le table_heavy -> NON le forziamo a VLM.
[routing]
min_words_text_route = 5         # pagina con < N parole estraibili -> VLM
# table_rects_force_vlm omesso = disattivato

# Rafforzamenti del checksum (§M2): negazioni/vincoli persi e scambi di abbinamento codice.
[gate]
critical_words = ["non", "esclusi", "salvo", "tranne", "fino a", "almeno", "entro"]
code_label_overlap_min = 0.5     # sotto questa soglia: possibile etichetta scambiata

# Lint d'igiene sul markdown (§B.2): i fail bloccano la pagina; stringhe orfane = warning.
[lint]
orphan_warn_strings = ["Agenzia delle Entrate", "Agenzia Entrate"]

# Tariffe LLM in USD per 1.000.000 di token. Config, NON hardcoded (FR-T2).
# Fonte: listino Anthropic. `updated` = data di verifica delle tariffe.
updated = "2026-06-05"

[models.claude-opus-4-8]
input_per_mtok = 5.00
output_per_mtok = 25.00

[models.claude-haiku-4-5]
input_per_mtok = 1.00
output_per_mtok = 5.00

# Moltiplicatori sul prezzo input per i token di cache (FR-B5).
# read: token serviti da cache (~0.1x). write: token scritti in cache.
[cache]
read_multiplier = 0.10
write_5m_multiplier = 1.25
write_1h_multiplier = 2.00
